---

- name: Initialiser les compteurs de l'audit
  ansible.builtin.set_fact:
    audit_results: []
    audit_passed_count: 0

- name: Exécuter les vérifications de sécurité
  ansible.builtin.shell: "{{ item.check_cmd }}"
  register: audit_check_output
  loop: "{{ audit_items }}"
  changed_when: false
  failed_when: false

- name: Compiler les résultats et calculer le score
  ansible.builtin.set_fact:
    audit_results: >-
      {{ audit_results + [{'name': item.item.name,
        'status': (item.stdout == item.item.expected),
        'expected': item.item.expected,
        'actual': item.stdout,
        'desc': item.item.desc}] }}
    audit_passed_count: "{{ audit_passed_count | int + (1 if item.stdout == item.item.expected else 0) }}"
  loop: "{{ audit_check_output.results }}"

- name: Calculer le score final en %
  ansible.builtin.set_fact:
    audit_score: "{{ (audit_passed_count | int / audit_items | length * 100) | round(1) }}"

- name: Générer le rapport d'audit (temporaire sur la cible)
  ansible.builtin.template:
    src: report.j2
    dest: "/tmp/audit_{{ inventory_hostname }}.md"
    mode: '0600'

- name: Rapatrier le rapport sur le serveur Ansible (local)
  ansible.builtin.fetch:
    src: "/tmp/audit_{{ inventory_hostname }}.md"
    dest: >-
      reports/audit_{{ inventory_hostname }}_{{ ansible_facts['date_time']['date'] }}_{{ ansible_facts['date_time']['hour'] }}h{{ ansible_facts['date_time']['minute'] }}.md
    flat: true

- name: Nettoyer le rapport temporaire sur la cible
  ansible.builtin.file:
    path: "/tmp/audit_{{ inventory_hostname }}.md"
    state: absent

- name: Afficher le score final
  ansible.builtin.debug:
    msg: >-
      Audit terminé pour {{ inventory_hostname }}.
      Score : {{ audit_score }}%.
      Rapport local : reports/audit_{{ inventory_hostname }}_{{ ansible_facts['date_time']['date'] }}_{{ ansible_facts['date_time']['hour'] }}h{{ ansible_facts['date_time']['minute'] }}.md
